<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Link Variator Generator Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        h2 { color: #1877f2; margin-top: 0; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; }
        textarea, input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; font-family: monospace; }
        button { background-color: #1877f2; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background-color: #166fe5; }
        .result-box { background: #f9f9f9; border: 1px dashed #1877f2; padding: 15px; margin-top: 20px; border-radius: 6px; display: none; }
        .btn-copy { background-color: #42b72a; margin-top: 10px; }
        .btn-copy:hover { background-color: #36a420; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 Bulk Link Variator Generator Pro</h2>
    
    <label for="targetLinks">Masukkan Link Video Tujuan (Satu link per baris):</label>
    <textarea id="targetLinks" rows="6" placeholder="https://videy.co/v?id=video1"></textarea>

    <label for="totalVariations">Jumlah Link Variasi Yang Mau Dibuat (Per Link Tujuan):</label>
    <input type="number" id="totalVariations" value="5" min="1" max="50">

    <button id="btnGenerate" onclick="generateBulkLinks()">Generate Variasi Link</button>

    <div id="resultWrapper" class="result-box">
        <label style="color: #1877f2;">🎁 Hasil Link Variasi Siap Sebar (.mp4):</label>
        <textarea id="outputResults" rows="10" readonly></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">Salin Semua Link</button>
    </div>
</div>

<script>
    async function generateBulkLinks() {
        const targetLinksRaw = document.getElementById('targetLinks').value.trim();
        const totalVariations = document.getElementById('totalVariations').value;
        const btn = document.getElementById('btnGenerate');
        const resultWrapper = document.getElementById('resultWrapper');
        const outputResults = document.getElementById('outputResults');

        if (!targetLinksRaw) {
            alert("Masukkan minimal satu link tujuan dulu bos!");
            return;
        }

        const linksArray = targetLinksRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

        btn.disabled = true;
        btn.textContent = "Sedang memproses & menyimpan ke DB...";

        try {
            const response = await fetch('/api/generate-links', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ links: linksArray, count: parseInt(totalVariations) })
            });

            const hasil = await response.json();

            if (hasil.success) {
                resultWrapper.style.display = "block";
                
                // PENTING: Kita pakai domain kustom pilihanmu di sini
                const customDomain = "https://cdn2.videiy.biz.id";
                
                // Hasil akhirnya otomatis ditambahkan .mp4 di belakangnya
                const generatedUrls = hasil.variations.map(v => customDomain + '/' + v + '.mp4').join('\n');
                outputResults.value = generatedUrls;
            } else {
                alert("Gagal: " + hasil.error);
            }
        } catch (err) {
            alert("Terjadi kesalahan sistem.");
        } finally {
            btn.disabled = false;
            btn.textContent = "Generate Variasi Link";
        }
    }

    // Fungsi salin clipboard tetap sama
    function copyToClipboard() {
        const outputResults = document.getElementById('outputResults');
        outputResults.select();
        document.execCommand('copy');
        alert('Semua link variasi berhasil disalin!');
    }
</script>

</body>
</html>
